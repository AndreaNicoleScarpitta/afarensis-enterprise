openapi: "3.0.3"
info:
  title: Afarensis Enterprise API
  description: >
    Enterprise-grade clinical evidence review platform for regulatory submissions.
    Implements a 12-layer capability model for evidence evaluation, comparability
    analysis, bias detection, and regulatory artifact generation.
  version: "2.0.0"
  contact:
    name: Synthetic Ascension
  license:
    name: Proprietary

servers:
  - url: http://localhost:8000/api/v1
    description: Development server

security:
  - BearerAuth: []

tags:
  - name: Health
    description: System health and status
  - name: Authentication
    description: User authentication and token management
  - name: Projects
    description: Research project management (Layer 1)
  - name: Evidence
    description: Evidence discovery and extraction (Layers 2-3)
  - name: Comparability
    description: Anchor generation and comparability scoring (Layers 4-5)
  - name: Bias Analysis
    description: Bias detection and fragility analysis (Layer 6)
  - name: Review
    description: Evidence critique and reviewer decisions (Layers 8-9)
  - name: Artifacts
    description: Regulatory artifact generation (Layer 10)
  - name: Statistics
    description: Statistical analysis endpoints
  - name: Search
    description: Evidence search and discovery
  - name: Federated
    description: Federated evidence network (Layers 11-12)
  - name: Admin
    description: User and system administration
  - name: SAR Pipeline
    description: Safety Assessment Report pipeline
  - name: AI & Workflow
    description: Automated analysis and workflow guidance

# =============================================================================
# PATHS
# =============================================================================
paths:

  # ---------------------------------------------------------------------------
  # Health
  # ---------------------------------------------------------------------------
  /health:
    get:
      operationId: getHealth
      summary: System health check
      tags: [Health]
      security: []
      responses:
        "200":
          description: System is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  # ---------------------------------------------------------------------------
  # Authentication
  # ---------------------------------------------------------------------------
  /auth/login:
    post:
      operationId: login
      summary: Authenticate user and obtain JWT tokens
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"

  /auth/me:
    get:
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user profile
      tags: [Authentication]
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/logout:
    post:
      operationId: logout
      summary: Invalidate current session tokens
      tags: [Authentication]
      responses:
        "200":
          description: Logout successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/refresh:
    post:
      operationId: refreshToken
      summary: Refresh an expired access token using refresh token cookie
      tags: [Authentication]
      security: []
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ---------------------------------------------------------------------------
  # Projects
  # ---------------------------------------------------------------------------
  /projects:
    post:
      operationId: createProject
      summary: Create a new research project
      tags: [Projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectCreateRequest"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
    get:
      operationId: listProjects
      summary: List all projects for the current user
      tags: [Projects]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, active, completed, archived, on_hold]
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paginated list of projects
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedProjectResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /projects/{project_id}:
    get:
      operationId: getProject
      summary: Get a single project by ID
      tags: [Projects]
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /projects/{project_id}/upload:
    post:
      operationId: uploadProjectFile
      summary: Upload a file (PDF, CSV, RIS) to a project for evidence extraction
      tags: [Projects]
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required: [file]
      responses:
        "200":
          description: File uploaded and queued for processing
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  file_id:
                    type: string
                    format: uuid
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  # ---------------------------------------------------------------------------
  # Evidence (Layers 2-3)
  # ---------------------------------------------------------------------------
  /projects/{project_id}/discover-evidence:
    post:
      operationId: discoverEvidence
      summary: Trigger automated evidence discovery from configured sources
      tags: [Evidence]
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                sources:
                  type: array
                  items:
                    type: string
                    enum: [pubmed, clinicaltrials, openalex, semanticscholar]
                max_results:
                  type: integer
                  default: 50
                query_override:
                  type: string
      responses:
        "200":
          description: Evidence discovery initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  task_id:
                    type: string
                  status:
                    type: string
                  discovered_count:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /projects/{project_id}/evidence:
    get:
      operationId: listProjectEvidence
      summary: List evidence records for a project
      tags: [Evidence]
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, screening, in_review, approved, rejected, archived]
        - name: source
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paginated list of evidence records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedEvidenceResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /projects/{project_id}/evidence/network:
    get:
      operationId: getEvidenceNetwork
      summary: Get the citation/relationship network graph for project evidence
      tags: [Evidence]
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Evidence network graph
          content:
            application/json:
              schema:
                type: object
                properties:
                  nodes:
                    type: array
                    items:
                      type: object
                  edges:
                    type: array
                    items:
                      type: object
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /evidence-patterns:
    get:
      operationId: getEvidencePatterns
      summary: Get cross-project evidence patterns and trends
      tags: [Evidence]
      responses:
        "200":
          description: Evidence pattern analysis
          content:
            application/json:
              schema:
                type: object
                properties:
                  patterns:
                    type: array
                    items:
                      type: object
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ---------------------------------------------------------------------------
  # Comparability (Layers 4-5)
  # ---------------------------------------------------------------------------
  /projects/{project_id}/generate-anchors:
    post:
      operationId: generateAnchors
      summary: Generate comparability anchors between evidence records
      tags: [Comparability]
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                anchor_type:
                  type: string
                  enum: [pico, outcome, population, intervention]
                evidence_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        "200":
          description: Anchors generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  anchors:
                    type: array
                    items:
                      type: object
                  count:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /projects/{project_id}/comparability-scores:
    get:
      operationId: getComparabilityScores
      summary: Retrieve computed comparability scores for project evidence
      tags: [Comparability]
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Comparability score matrix
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComparabilityScoreResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Bias Analysis (Layer 6)
  # ---------------------------------------------------------------------------
  /projects/{project_id}/analyze-bias:
    post:
      operationId: analyzeBias
      summary: Run bias detection and fragility analysis on project evidence
      tags: [Bias Analysis]
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                analysis_type:
                  type: string
                  enum: [rob2, robins_i, fragility_index, combined]
                  default: combined
                evidence_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        "200":
          description: Bias analysis initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  task_id:
                    type: string
                  status:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /projects/{project_id}/bias-analysis:
    get:
      operationId: getBiasAnalysis
      summary: Retrieve bias analysis results for a project
      tags: [Bias Analysis]
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Bias analysis results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BiasAnalysisResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Review (Layers 8-9)
  # ---------------------------------------------------------------------------
  /projects/{project_id}/generate-critique:
    post:
      operationId: generateCritique
      summary: Generate AI-assisted evidence critique for reviewer guidance
      tags: [Review]
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                evidence_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                critique_depth:
                  type: string
                  enum: [summary, standard, deep]
                  default: standard
      responses:
        "200":
          description: Critique generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  critiques:
                    type: array
                    items:
                      type: object
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /projects/{project_id}/evidence/{evidence_id}/decision:
    post:
      operationId: submitEvidenceDecision
      summary: Submit a reviewer decision on a specific evidence record
      tags: [Review]
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/EvidenceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewDecisionRequest"
      responses:
        "200":
          description: Decision recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewDecisionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /projects/{project_id}/decisions:
    get:
      operationId: listProjectDecisions
      summary: List all reviewer decisions for a project
      tags: [Review]
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: List of decisions
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/ReviewDecisionResponse"
                  total:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /review/workflows:
    post:
      operationId: createReviewWorkflow
      summary: Create a structured review workflow with stages and assignments
      tags: [Review]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                project_id:
                  type: string
                  format: uuid
                workflow_type:
                  type: string
                  enum: [single_reviewer, dual_reviewer, consensus]
                stages:
                  type: array
                  items:
                    type: object
              required: [project_id, workflow_type]
      responses:
        "201":
          description: Workflow created
          content:
            application/json:
              schema:
                type: object
                properties:
                  workflow_id:
                    type: string
                    format: uuid
                  status:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  /review/assignments:
    post:
      operationId: createReviewAssignment
      summary: Assign evidence to a reviewer
      tags: [Review]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                evidence_id:
                  type: string
                  format: uuid
                reviewer_id:
                  type: string
                  format: uuid
                workflow_id:
                  type: string
                  format: uuid
                priority:
                  type: string
                  enum: [low, medium, high, urgent]
              required: [evidence_id, reviewer_id]
      responses:
        "201":
          description: Assignment created
          content:
            application/json:
              schema:
                type: object
                properties:
                  assignment_id:
                    type: string
                    format: uuid
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
    get:
      operationId: listReviewAssignments
      summary: List review assignments for the current user or project
      tags: [Review]
      parameters:
        - name: project_id
          in: query
          schema:
            type: string
            format: uuid
        - name: reviewer_id
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum: [assigned, in_progress, completed, rejected]
      responses:
        "200":
          description: List of assignments
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                  total:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"

  /review/comments:
    post:
      operationId: createReviewComment
      summary: Add a comment to an evidence review thread
      tags: [Review]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                evidence_id:
                  type: string
                  format: uuid
                content:
                  type: string
                parent_comment_id:
                  type: string
                  format: uuid
              required: [evidence_id, content]
      responses:
        "201":
          description: Comment created
          content:
            application/json:
              schema:
                type: object
                properties:
                  comment_id:
                    type: string
                    format: uuid
                  created_at:
                    type: string
                    format: date-time
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  /review/comments/{evidence_id}:
    get:
      operationId: getReviewComments
      summary: Get all comments for a specific evidence record
      tags: [Review]
      parameters:
        - $ref: "#/components/parameters/EvidenceIdPath"
      responses:
        "200":
          description: List of comments
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                  total:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /review/decisions:
    post:
      operationId: submitReviewDecision
      summary: Submit a formal review decision (include/exclude/uncertain)
      tags: [Review]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewDecisionRequest"
      responses:
        "200":
          description: Decision submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewDecisionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  /review/conflicts/resolve:
    post:
      operationId: resolveReviewConflict
      summary: Resolve conflicting reviewer decisions on an evidence record
      tags: [Review]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                evidence_id:
                  type: string
                  format: uuid
                resolution:
                  type: string
                  enum: [include, exclude, escalate]
                rationale:
                  type: string
              required: [evidence_id, resolution, rationale]
      responses:
        "200":
          description: Conflict resolved
          content:
            application/json:
              schema:
                type: object
                properties:
                  resolution_id:
                    type: string
                    format: uuid
                  status:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  /review/presence/{evidence_id}:
    get:
      operationId: getReviewPresence
      summary: Get active reviewers currently viewing an evidence record
      tags: [Review]
      parameters:
        - $ref: "#/components/parameters/EvidenceIdPath"
      responses:
        "200":
          description: Active reviewers
          content:
            application/json:
              schema:
                type: object
                properties:
                  active_users:
                    type: array
                    items:
                      type: object
                      properties:
                        user_id:
                          type: string
                          format: uuid
                        username:
                          type: string
                        last_active:
                          type: string
                          format: date-time
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: updateReviewPresence
      summary: Update reviewer presence status on an evidence record
      tags: [Review]
      parameters:
        - $ref: "#/components/parameters/EvidenceIdPath"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                  enum: [join, leave, heartbeat]
      responses:
        "200":
          description: Presence updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ---------------------------------------------------------------------------
  # Artifacts (Layer 10)
  # ---------------------------------------------------------------------------
  /projects/{project_id}/generate-artifact:
    post:
      operationId: generateArtifact
      summary: Generate a regulatory artifact (PRISMA, forest plot, SoE table, etc.)
      tags: [Artifacts]
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                artifact_type:
                  type: string
                  enum: [prisma_diagram, forest_plot, soe_table, grade_assessment, narrative_synthesis, submission_package]
                format:
                  type: string
                  enum: [pdf, docx, html, json]
                  default: pdf
                options:
                  type: object
              required: [artifact_type]
      responses:
        "200":
          description: Artifact generation initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegulatoryArtifactResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /projects/{project_id}/artifacts:
    get:
      operationId: listProjectArtifacts
      summary: List all generated artifacts for a project
      tags: [Artifacts]
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: List of artifacts
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/RegulatoryArtifactResponse"
                  total:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /artifacts/{artifact_id}/download:
    get:
      operationId: downloadArtifact
      summary: Download a generated regulatory artifact file
      tags: [Artifacts]
      parameters:
        - name: artifact_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Artifact file binary
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Statistics
  # ---------------------------------------------------------------------------
  /statistics/full-analysis:
    get:
      operationId: getFullStatisticalAnalysis
      summary: Run full statistical analysis across all project evidence
      tags: [Statistics]
      parameters:
        - name: project_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Comprehensive statistical analysis
          content:
            application/json:
              schema:
                type: object
                properties:
                  summary_statistics:
                    type: object
                  meta_analysis:
                    type: object
                  heterogeneity:
                    type: object
                  sensitivity_analysis:
                    type: object
        "401":
          $ref: "#/components/responses/Unauthorized"

  /statistics/summary:
    get:
      operationId: getStatisticsSummary
      summary: Get summary statistics for the platform
      tags: [Statistics]
      responses:
        "200":
          description: Summary statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_projects:
                    type: integer
                  total_evidence:
                    type: integer
                  total_reviews:
                    type: integer
                  total_artifacts:
                    type: integer
        "401":
