# =============================================================================
# COMPONENTS
# =============================================================================
components:

  # ---------------------------------------------------------------------------
  # Security Schemes
  # ---------------------------------------------------------------------------
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        JWT access token obtained from /auth/login. Tokens include issuer
        (afarensis-enterprise), audience (afarensis-api), and a unique JTI
        for revocation support. Access tokens expire per server configuration
        (default 30 minutes). Refresh via /auth/refresh using httpOnly cookie.

  # ---------------------------------------------------------------------------
  # Reusable Parameters
  # ---------------------------------------------------------------------------
  parameters:
    ProjectId:
      name: project_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Unique project identifier

    EvidenceId:
      name: evidence_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Unique evidence record identifier

    EvidenceIdPath:
      name: evidence_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Unique evidence record identifier

  # ---------------------------------------------------------------------------
  # Reusable Responses
  # ---------------------------------------------------------------------------
  responses:
    Unauthorized:
      description: Authentication required or token expired
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Forbidden:
      description: Insufficient permissions for this operation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    NotFound:
      description: Requested resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    ValidationError:
      description: Request body validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationErrorResponse"

  # ---------------------------------------------------------------------------
  # Schemas
  # ---------------------------------------------------------------------------
  schemas:

    # --- Authentication ---
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          example: analyst@afarensis.io
        password:
          type: string
          format: password
          minLength: 8
      required: [email, password]

    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
          description: JWT access token
        refresh_token:
          type: string
          description: JWT refresh token (also set as httpOnly cookie)
        token_type:
          type: string
          example: bearer
        user:
          $ref: "#/components/schemas/UserResponse"

    # --- Projects ---
    ProjectCreateRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
        status:
          type: string
          enum: [draft, active, completed, archived, on_hold]
          default: draft
      required: [name]

    ProjectResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [draft, active, completed, archived, on_hold]
        owner_id:
          type: string
          format: uuid
          nullable: true
        created_by:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PaginatedProjectResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ProjectResponse"
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer

    # --- Evidence ---
    EvidenceRecordResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        abstract:
          type: string
          nullable: true
        authors:
          type: array
          items:
            type: string
        publicationDate:
          type: string
          nullable: true
        source:
          type: string
          enum: [pubmed, clinicaltrials, openalex, semanticscholar, manual]
        sourceId:
          type: string
          nullable: true
        doi:
          type: string
          nullable: true
        qualityScore:
          type: number
          format: float
          nullable: true
          minimum: 0
          maximum: 100
        status:
          type: string
          enum: [pending, screening, in_review, approved, rejected, archived]
        aiSummary:
          type: string
          nullable: true
        metadataJson:
          type: object
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        createdBy:
          type: string
          nullable: true
        updatedBy:
          type: string
          nullable: true

    PaginatedEvidenceResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/EvidenceRecordResponse"
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer

    # --- Comparability ---
    ComparabilityScoreResponse:
      type: object
      properties:
        project_id:
          type: string
          format: uuid
        scores:
          type: array
          items:
            type: object
            properties:
              evidence_a_id:
                type: string
                format: uuid
              evidence_b_id:
                type: string
                format: uuid
              overall_score:
                type: number
                format: float
                minimum: 0
                maximum: 1
              dimension_scores:
                type: object
                properties:
                  population:
                    type: number
                  intervention:
                    type: number
                  outcomes:
                    type: number
                  study_design:
                    type: number
        generated_at:
          type: string
          format: date-time

    # --- Bias ---
    BiasAnalysisResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, running, completed, failed]
        results:
          type: object
          nullable: true
          properties:
            overall_risk:
              type: string
              enum: [low, some_concerns, high]
            domain_assessments:
              type: array
              items:
                type: object
            fragility_index:
              type: integer
              nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # --- Review Decisions ---
    ReviewDecisionRequest:
      type: object
      properties:
        evidence_id:
          type: string
          format: uuid
        decision:
          type: string
          enum: [include, exclude, uncertain]
        confidence_level:
          type: number
          format: float
          minimum: 0
          maximum: 1
        rationale:
          type: string
        quality_rating:
          type: integer
          minimum: 1
          maximum: 10
      required: [evidence_id, decision, rationale]

    ReviewDecisionResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        evidence_id:
          type: string
          format: uuid
        reviewer_id:
          type: string
          format: uuid
        decision:
          type: string
          enum: [include, exclude, uncertain]
        confidence_level:
          type: number
          format: float
        rationale:
          type: string
        quality_rating:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # --- Artifacts ---
    RegulatoryArtifactResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        artifact_type:
          type: string
          enum: [prisma_diagram, forest_plot, soe_table, grade_assessment, narrative_synthesis, submission_package]
        format:
          type: string
          enum: [pdf, docx, html, json]
        status:
          type: string
          enum: [generating, completed, failed]
        download_url:
          type: string
          nullable: true
        file_size:
          type: integer
          nullable: true
        generated_at:
          type: string
          format: date-time
        metadata:
          type: object
          nullable: true

    # --- Users ---
    UserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        fullName:
          type: string
        role:
          type: string
          enum: [viewer, analyst, reviewer, admin]
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # --- Audit ---
    AuditLogResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        event_type:
          type: string
        user_id:
          type: string
          format: uuid
          nullable: true
        resource_type:
          type: string
          nullable: true
        resource_id:
          type: string
          nullable: true
        details:
          type: object
        ip_address:
          type: string
          nullable: true
        timestamp:
          type: string
          format: date-time

    # --- Health ---
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: healthy
        timestamp:
          type: string
          format: date-time
        database:
          type: string
          enum: [connected, disconnected]
        version:
          type: string
          example: "2.0.0"

    # --- Errors ---
    ErrorResponse:
      type: object
      properties:
        detail:
          type: string
      required: [detail]

    ValidationErrorResponse:
      type: object
      properties:
        detail:
          type: string
        errors:
          type: array
          items:
            type: object
            properties:
              loc:
                type: array
                items:
                  oneOf:
                    - type: string
                    - type: integer
              msg:
                type: string
              type:
                type: string
