# Afarensis Enterprise Nginx Configuration - WebSocket & Docker DNS Fixed
# Handles reverse proxy with proper WebSocket support and dynamic upstream resolution

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    # CRITICAL FIX: Use Docker's embedded DNS resolver
    resolver 127.0.0.11 valid=30s ipv6=off;
    
    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/m;
    
    # Connection limits
    limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;
    
    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;
    
    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;
    
    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Content Security Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss: https://api.anthropic.com https://api.openai.com; font-src 'self'; frame-ancestors 'none';" always;
    
    # Backend upstream with dynamic resolution
    upstream backend {
        least_conn;
        server backend:8000 max_fails=3 fail_timeout=30s;
    }
    
    # Frontend upstream
    upstream frontend {
        least_conn;
        server frontend:80 max_fails=3 fail_timeout=30s;
    }
    
    server {
        listen 80;
        server_name _;
        
        # Rate limiting
        limit_conn conn_limit_per_ip 20;
        limit_req zone=general burst=30 nodelay;
        
        # Health check endpoint
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
        
        # CRITICAL FIX: WebSocket support for real-time collaboration
        location /ws/ {
            # Dynamic upstream resolution
            set $upstream_backend backend:8000;
            proxy_pass http://$upstream_backend;
            
            # CRITICAL: WebSocket upgrade headers
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # CRITICAL: Long timeout for WebSocket connections
            proxy_read_timeout 86400;
            proxy_connect_timeout 60;
            proxy_send_timeout 60;
            
            # Disable proxy buffering for real-time data
            proxy_buffering off;
        }
        
        # API endpoints with rate limiting
        location /api/v1/auth/ {
            limit_req zone=auth burst=10 nodelay;
            
            set $upstream_backend backend:8000;
            proxy_pass http://$upstream_backend;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts for auth endpoints
            proxy_connect_timeout 10s;
            proxy_send_timeout 10s;
            proxy_read_timeout 30s;
        }
        
        # General API endpoints
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            
            set $upstream_backend backend:8000;
            proxy_pass http://$upstream_backend;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Extended timeout for LLM API calls
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 300s;  # 5 minutes for long LLM processing
            
            # Enable request buffering for large uploads
            client_body_buffer_size 256k;
        }
        
        # Documentation endpoints
        location ~ ^/(docs|redoc|openapi.json) {
            # Block in production
            # return 403;
            
            set $upstream_backend backend:8000;
            proxy_pass http://$upstream_backend;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Static file uploads and artifacts
        location /uploads/ {
            alias /var/www/artifacts/;
            expires 1h;
            add_header Cache-Control "public, immutable";
            
            # Security: Prevent execution of uploaded files
            location ~* \.(php|py|js|html)$ {
                deny all;
            }
        }
        
        # Frontend application
        location / {
            set $upstream_frontend frontend:80;
            proxy_pass http://$upstream_frontend;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Frontend timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout 10s;
            proxy_read_timeout 30s;
            
            # Enable compression
            gzip on;
            gzip_vary on;
            gzip_min_length 1000;
            gzip_types
                text/plain
                text/css
                text/xml
                text/javascript
                application/json
                application/javascript
                application/xml+rss
                application/atom+xml
                image/svg+xml;
        }
        
        # Block common attacks
        location ~ /\.(?!well-known) {
            deny all;
        }
        
        location ~ /\.(htaccess|htpasswd|env|git) {
            deny all;
        }
    }
    
    # HTTPS server configuration (when SSL is available)
    server {
        listen 443 ssl http2;
        server_name _;
        
        # SSL configuration
        ssl_certificate /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;
        
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        
        # Include same location blocks as HTTP server
        # (locations would be duplicated here in production)
    }
}

# CRITICAL CONFIGURATION NOTES:
# 1. resolver 127.0.0.11 - Uses Docker's embedded DNS for service discovery
# 2. proxy_http_version 1.1 + Upgrade headers - Required for WebSocket support
# 3. proxy_read_timeout 86400 - Keeps WebSocket connections alive for 24 hours
# 4. Dynamic upstream variables - Prevents startup failures when services aren't ready
# 5. Rate limiting on auth endpoints - Prevents brute force attacks
# 6. Extended timeouts for LLM endpoints - Handles long AI processing times
# 7. Security headers - Provides basic XSS/CSRF protection
# 8. Static file security - Prevents execution of uploaded content
