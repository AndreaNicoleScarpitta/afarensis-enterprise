    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is an external control arm?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "An external control arm (ECA) uses patient data from outside a clinical trial — such as natural history studies, registries, or real-world data — as the comparator group instead of a randomized placebo arm. ECAs are critical in rare disease where randomization is often infeasible."
          }
        },
        {
          "@type": "Question",
          "name": "Why do externally controlled trials fail at FDA review?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The primary failure mode is comparability: the external control population must be demonstrably similar to the trial population in dimensions that affect regulatory judgment. Only 16.1% of externally controlled trials prespecify their statistical analysis plan, and only 1.1% conduct quantitative bias analysis."
          }
        },
        {
          "@type": "Question",
          "name": "What is SA Validate?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "SA Validate is a clinical claim validation workspace built by Synthetic Ascension. It uses PICO/PECO standards to systematically validate clinical evidence claims against PubMed, ClinicalTrials.gov, and FDA data sources, producing an auditable Evidence Support Score from 0-100."
          }
        },
        {
          "@type": "Question",
          "name": "Who is Synthetic Ascension built for?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Synthetic Ascension serves rare disease sponsors whose active externally controlled programs are exposed to the current regulatory environment — particularly those preparing FDA submissions with external control arms or natural history comparators."
          }
        }
      ]
    }
    </script>

      #loading-screen {

        margin-bottom: 2rem;
      }

      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-top: 3px solid white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      .loading-progress {

        text-align: center;
        font-size: 0.9rem;

  <body>
    <!-- Loading Screen (app subdomain only — hidden on marketing domain) -->
    <div id="loading-screen">
      <div class="loading-logo">Afarensis</div>
      <div class="loading-subtitle">Enterprise Clinical Evidence Platform</div>
      <div class="loading-spinner"></div>
      <div class="loading-progress">Initializing regulatory compliance systems...</div>
    </div>
    <script>
      // Hide loading screen immediately on the marketing domain
      (function() {
        var h = window.location.hostname;
        var isApp = h.indexOf('app.') === 0 || h === 'localhost' || h === '127.0.0.1';
        if (!isApp) {
          var ls = document.getElementById('loading-screen');
          if (ls) ls.style.display = 'none';
        }
      })();
    </script>

    <!-- React App Mount Point -->
    <div id="root"></div>

    <!-- Remove loading screen once React loads -->
    <script>
      window.addEventListener('DOMContentLoaded', function() {
        setTimeout(function() {
          var loadingScreen = document.getElementById('loading-screen');
          if (loadingScreen) {
            loadingScreen.style.opacity = '0';
            loadingScreen.style.transition = 'opacity 0.5s ease-out';
            setTimeout(function() { loadingScreen.remove(); }, 500);
          }
        }, 100);
      });
    </script>
